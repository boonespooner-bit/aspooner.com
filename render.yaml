services:
  - type: web
    name: aspooner-com
    runtime: static
    repo: https://github.com/boonespooner-bit/aspooner.com
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: ./out
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
